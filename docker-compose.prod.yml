version: "3.9"
# Продакшен: собирает образы прямо на сервере (без Docker registry)
# Запуск: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ai_shoper
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.prod
    ports:
      - "127.0.0.1:8000:8000"   # только localhost — nginx проксирует снаружи
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.prod
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=2

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.prod
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    command: celery -A app.workers.celery_app beat --loglevel=warning

volumes:
  pgdata:
  redisdata:
